name: Deploy Application (Staging)

on:
  workflow_dispatch:

env:
  APP_NAME: app-exam-simulator-stg

jobs:
  deploy:
    name: Build and deploy application
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Publish
        run: |
          dotnet publish src/ExamSimulator.Web/ExamSimulator.Web.csproj \
            --configuration Release \
            --output ./publish

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure App Service (staging)
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.APP_NAME }}
          package: ./publish
