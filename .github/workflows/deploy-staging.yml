name: Deploy to Staging

on:
  workflow_dispatch:

env:
  RESOURCE_GROUP: rg-exam-simulator-stg
  APP_NAME: app-exam-simulator-stg

jobs:
  provision:
    name: Provision infrastructure
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy Bicep
        uses: azure/arm-deploy@v2
        with:
          resourceGroupName: ${{ env.RESOURCE_GROUP }}
          template: infra/bicep/main.bicep
          parameters: infra/bicep/environments/staging/staging.bicepparam adminLogin=${{ secrets.SQL_ADMIN_LOGIN }} adminPassword=${{ secrets.SQL_ADMIN_PASSWORD }}
          failOnStdErr: false

  deploy:
    name: Build and deploy application
    runs-on: ubuntu-latest
    needs: provision
    environment: staging

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Publish
        run: |
          dotnet publish src/ExamSimulator.Web/ExamSimulator.Web.csproj \
            --configuration Release \
            --output ./publish

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure App Service (staging)
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.APP_NAME }}
          package: ./publish
